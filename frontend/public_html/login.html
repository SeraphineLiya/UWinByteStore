<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | UWinByteStore</title>
<meta name="description" content=" Administrator login page for UWinByteStore to manage technology catalog products.">
<meta name="keywords" content="UWinByteStore login, admin login, technology catalog admin">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="css/main.css">
<script src="/js/theme.js" defer></script>
</head>
<body>
 <header>
<h1>UWinByteStore</h1>

<nav>
<a href="index.html">Home</a>
<a href="catalog.php">Products</a>
<a href="about.html">About</a>
<a href="help.html">Help</a>
<a href="login.html">Login</a>
<a href="signup.html">Signup</a>
</nav>
</header>
    <div class = "container">
        <!-- Below is the Div for the login form. It is the main content of this page. -->
        <div class = "maincontent">
            <!-- Form will run the login.php script on the server for authentication. 
            TODO: @Souper Please feel free to add client-side JavaScript validation to this form as well if you would like.-->
            <form action="/processlogin.php" method = "post">
                <!--TODO: @NotDashy, I would recommend adding CSS flexboxes on either side of this fieldset
                to flexibly center the login box in the page; up to you though of course!-->
                <!--Box containing login form elements-->
                <fieldset>
                    <legend>Administrator Login</legend>
                    
                    <!--Inputs and associated labels. Username is an input of type email
                    while password is naturally of type password. Both fields are required.-->
                    <label for = "username">Username:</label>
                    <br>
                    <input type="email" id = "username" name = "username" required>

                    <br>

                    <!--Password input and associated label.-->
                    <label for = "password">Password:</label>
                    <br>
                    <input type="password" id = "password" name = "password" required> 
                
                    <br>
                    
                    <a href="/signup.html">Request Account</a> <!-- Goes to sign up page -->
                    <a href="./Help/login.html">Help</a> <!--Links to a page that describes solutions to common issues logging in-->
                    
                    <br>
                    
                    <!--Submit button.-->
                    <button id="submitLogin">Submit</button>
                </fieldset>
            </form>
        </div>
    </div>
<footer>
