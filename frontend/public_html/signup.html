<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | UWinByteStore</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<h1>UWinByteStore</h1>
<nav>
<a href="index.html">Home</a>
<a href="catalog.php">Products</a>
<a href="about.html">About</a>
<a href="login.html">Login</a>
<a href="signup.html">Signup</a>
</nav>
</header>
<div class = "container">
    <!-- Div for Account Creation box. It is the main content of this page. -->
    <div class = "maincontent">
        <!-- The following form will run the signup script on the server for authentication.
         This script will create an account in the users database, which an existing admin can then grant
         admin privileges (or not). 
         TODO: @Souper Please feel free to add client-side JavaScript validation to this form as well if you would like.
         The details of the server side validation are in createaccount.php and functions.php -->
        <form action="/createaccount.php" method = "post">
           <fieldset>
                <legend>Request Account</legend>
                
                <!--First Name. Required field.-->
                <label for="firstName">First Name:</label>
                <br>
                <input type="text" name="firstName" id="firstName" required>
                <br>

                <!--Last Name. Required field.-->
                <label for="lastName">Last Name:</label>
                <br>
                <input type="text" name="lastName" id="lastName" required>
                <br>
                
                <!--Email (serves as username). Required field.-->
                <label for="userEmail">Email Address:</label>
                <br>
                <input type="email" name="userEmail" id="userEmail" required>
                <br>
                
                <!--Set password. Required field.-->
                <!--TODO @Souper The server will check that the passwords match, but please feel free to
                also add JavaScript validation if you'd like.-->
                <label for="setPassword">Password:</label>
                <br>
                <input type="password" name="setPassword" id="setPassword" required>
                <br>

                <!--Confirm password-->
                <label for="confirmPassword">Confirm Password:</label>
                <br>
                <input type="password" name="confirmPassword" id="confirmPassword" required>
                <br>

                <!--Submit button.-->
                <button id="submitLogin">Submit</button>
            </fieldset>
        </form>
    </div>
</div>
<footer>
<p>&copy; 2026 UWinByteStore</p>
</footer>
</body>
</html>
